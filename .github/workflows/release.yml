name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true

      - name: Run tests
        run: go test ./...

  build-binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          name="gitlab-labelctl-${GOOS}-${GOARCH}"
          mkdir -p "dist/${name}"
          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" go build \
            -trimpath \
            -ldflags="-s -w -X github.com/postfriday/gitlab-labelctl/pkg/version.Version=${version}" \
            -o "dist/${name}/gitlab-labelctl" \
            ./cmd/gitlab-labelctl
          tar -C "dist/${name}" -czf "dist/${name}.tar.gz" gitlab-labelctl
          sha256sum "dist/${name}.tar.gz" > "dist/${name}.tar.gz.sha256"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitlab-labelctl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: image
        run: |
          set -euo pipefail
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.image.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-binaries
      - docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate changelog
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository }}
        run: |
          set -euo pipefail
          image_name="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          previous_tag="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"

          {
            echo "## Changelog"
            echo
            if [ -n "${previous_tag}" ]; then
              echo "Changes since \`${previous_tag}\`."
              echo
              git log "${previous_tag}..${GITHUB_REF_NAME}" --pretty=format:'- %s (%h)' --no-merges
            else
              echo "Initial release changelog."
              echo
              git log "${GITHUB_REF_NAME}" --pretty=format:'- %s (%h)' --no-merges
            fi
            echo
            echo
            echo "## Container image"
            echo
            echo "- \`${image_name}:${GITHUB_REF_NAME}\`"
            echo "- \`${image_name}:${GITHUB_REF_NAME#v}\`"
            echo "- \`${image_name}:latest\`"
          } > RELEASE_NOTES.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            dist/*.tar.gz
            dist/*.sha256
